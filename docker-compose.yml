services:
  bot:
    build: .
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: simple
      DATABASE_PASSWORD: simple
      DATABASE_NAME: simple_bot
      DATABASE_URL: postgresql://simple:simple@postgres:5432/simple_bot
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simple
      POSTGRES_PASSWORD: simple
      POSTGRES_DB: simple_bot
    # Exposes the DB to the host so `npm run dev` / `npm run db:migrate` on
    # localhost can reach it. If host port 5432 is already taken, change the
    # LEFT number to 5433 here and set DATABASE_PORT=5433 in .env.
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simple -d simple_bot"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
